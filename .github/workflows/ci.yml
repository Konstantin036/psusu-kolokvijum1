name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore IndustrialProcessingSystem.sln

      - name: Build
        run: dotnet build IndustrialProcessingSystem.sln -c Release --no-restore -m:1

      - name: Test (with coverage)
        run: dotnet test IndustrialProcessingSystem.sln -c Release --no-build -m:1 --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage dashboard
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"coveragereport" -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Add coverage summary
        shell: pwsh
        run: |
          $summary = Get-ChildItem coveragereport -Filter "*Summary*.md" | Select-Object -First 1
          if ($summary) {
            Get-Content $summary.FullName | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          } else {
            "Coverage HTML dashboard is available in the coverage-report-html artifact." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml

      - name: Upload coverage dashboard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-html
          path: coveragereport
